<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood_Identification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>
        // Check if user is authenticated before loading page
        if (!localStorage.getItem('authToken')) {
            alert('Please login first to access this page');
            window.location.href = '/';
        }
    </script>
</head>
<body class="registration-body">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container-fluid">
            
            <!-- Main Heading -->
            <a class="navbar-brand fw-bold" href="#">
                <i class="fas fa-droplet" style="margin-right: 8px;"></i>Emergency Blood Identifier
            </a>

            <!-- Toggle button for mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
                data-bs-target="#navbarNav" aria-controls="navbarNav" 
                aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar Options -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link active" href="Registration.html"><i class="fas fa-user-plus"></i> Registration</a>
                    <a class="nav-link" href="Identify.html"><i class="fas fa-search"></i> Identify Donor</a>
                    <a class="nav-link dashboard-link" href="Dash_board.html">
                        <i class="fas fa-chart-bar"></i> Dashboard
                    </a>
                    <button id="logoutBtn" class="btn btn-outline-light ms-3">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>

        </div>
    </nav>
    
    <!-- Registration Container -->
    <div class="registration-wrapper">
        <div class="registration-container">
            <div class="form-header">
                <h1><i class="fas fa-clipboard-list"></i> Student Blood Group Registration</h1>
                <p>Complete your blood group information securely</p>
            </div>
            
            <form id="studentForm" class="student_info">
                <!-- Name Field -->
                <div class="form-group">
                    <label for="s_name">
                        <i class="fas fa-user"></i> Student Name
                    </label>
                    <input type="text" id="s_name" placeholder="Enter your full name" required>
                </div>
                
                <!-- Age Field -->
                <div class="form-group">
                    <label for="s_age">
                        <i class="fas fa-calendar"></i> Student Age
                    </label>
                    <input type="number" id="s_age" placeholder="Enter your age" required>
                </div>
                
                <!-- Student ID Field -->
                <div class="form-group">
                    <label for="s_id">
                        <i class="fas fa-id-card"></i> Student ID
                    </label>
                    <input type="text" id="s_id" placeholder="Enter your student ID" required>
                </div>
                
                <!-- Email Field -->
                <div class="form-group">
                    <label for="s_email">
                        <i class="fas fa-envelope"></i> Email ID
                    </label>
                    <input type="email" id="s_email" placeholder="Enter your email address" required>
                </div>
                
                <!-- Phone Field -->
                <div class="form-group">
                    <label for="s_phone_no">
                        <i class="fas fa-phone"></i> Phone No
                    </label>
                    <input type="text" id="s_phone_no" placeholder="Enter your phone number" required>
                </div>
                
                <!-- Two Column Row -->
                <div class="form-row">
                    <!-- Department Field -->
                    <div class="form-group half">
                        <label for="s_deparment">
                            <i class="fas fa-book"></i> Department
                        </label>
                        <select id="s_deparment" class="form-select" required>
                            <option value="">--Select Department--</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Mechanical">Mechanical</option>
                            <option value="Civil">Civil</option>
                            <option value="Electrical">Electrical</option>
                        </select>
                    </div>
                    
                    <!-- Year Field -->
                    <div class="form-group half">
                        <label for="s_year">
                            <i class="fas fa-graduation-cap"></i> Level/Year
                        </label>
                        <select id="s_year" class="form-select" required>
                            <option value="">--Select Year--</option>
                            <option value="1">First Year</option>
                            <option value="2">Second Year</option>
                            <option value="3">Third Year</option>
                            <option value="4">Final Year</option>
                        </select>
                    </div>
                </div>
                
                <!-- Blood Group Field -->
                <div class="form-group">
                    <label for="bloodGroupDropdown">
                        <i class="fas fa-droplet" style="color: #dc3545;"></i> Select Blood Group
                    </label>
                    <div class="dropdown blood-group-dropdown">
                        <button class="btn btn-danger dropdown-toggle w-100" type="button" id="bloodGroupDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fas fa-caret-down"></i> Select Blood Group
                        </button>
                        <ul class="dropdown-menu w-100" aria-labelledby="bloodGroupDropdown">
                            <li><a class="dropdown-item" href="#" data-value="A+"><span class="blood-badge">A+</span></a></li>
                            <li><a class="dropdown-item" href="#" data-value="A-"><span class="blood-badge">A-</span></a></li>
                            <li><a class="dropdown-item" href="#" data-value="B+"><span class="blood-badge">B+</span></a></li>
                            <li><a class="dropdown-item" href="#" data-value="B-"><span class="blood-badge">B-</span></a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" data-value="AB+"><span class="blood-badge">AB+</span></a></li>
                            <li><a class="dropdown-item" href="#" data-value="AB-"><span class="blood-badge">AB-</span></a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" data-value="O+"><span class="blood-badge">O+</span></a></li>
                            <li><a class="dropdown-item" href="#" data-value="O-"><span class="blood-badge">O-</span></a></li>
                        </ul>
                    </div>
                    <input type="hidden" id="s_blood_group" required>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" class="submit-btn">
                    <i class="fas fa-check-circle"></i> Submit Student Info
                </button>
            </form>

            <div id="result"></div>
        </div>
    </div>
    
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { submitStudentRegistration } from "./Registration.js";

        // Handle blood group dropdown selection
        document.querySelectorAll('.dropdown-menu .dropdown-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                const value = this.getAttribute('data-value');
                const button = document.getElementById('bloodGroupDropdown');
                const input = document.getElementById('s_blood_group');
                
                // Update button text with icon and value
                button.innerHTML = '<i class="fas fa-caret-down"></i> ' + value;
                input.value = value;
                
                // Close the dropdown
                const dropdown = bootstrap.Dropdown.getInstance(button);
                if (dropdown) dropdown.hide();
            });
        });

        document.getElementById("studentForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            await submitStudentRegistration();
            // Reset dropdown button text after submission
            document.getElementById("bloodGroupDropdown").innerHTML = '<i class="fas fa-caret-down"></i> Select Blood Group';
        });

        // Logout functionality
        document.getElementById("logoutBtn").addEventListener("click", function() {
            localStorage.removeItem('authToken');
            window.location.href = "/";
        });

    </script>

</html>
