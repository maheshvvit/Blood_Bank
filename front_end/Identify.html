<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Identify Blood Donor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>
        // Check if user is authenticated
        if (!localStorage.getItem('authToken')) {
            alert('Please login first to access this page');
            window.location.href = '/';
        }
    </script>
</head>
<body class="identify-body">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">
                <i class="fas fa-droplet" style="margin-right: 8px;"></i>Emergency Blood Identifier
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="Registration.html"><i class="fas fa-user-plus"></i> Registration</a>
                    <a class="nav-link active" href="Identify.html"><i class="fas fa-search"></i> Identify Donor</a>
                    <a class="nav-link dashboard-link" href="Dash_board.html">
                        <i class="fas fa-chart-bar"></i> Dashboard
                    </a>
                    <button id="logoutBtn" class="btn btn-outline-light ms-3">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Search Wrapper -->
    <div class="identify-wrapper">
        <!-- Search Card -->
        <div class="search-card">
            <div class="form-header">
                <h1><i class="fas fa-search-plus"></i> Find Blood Donors</h1>
                <p>Search for available donors by blood group</p>
            </div>

            <div class="search-container">
                <form id="donorForm" class="donor-search-form">
                    <div class="form-group">
                        <label for="bloodGroup">
                            <i class="fas fa-droplet" style="color: #dc3545;"></i> Select Blood Group
                        </label>
                        <div class="blood-group-selector">
                            <select id="bloodGroup" class="form-select" required>
                                <option value="">-- Select Blood Group --</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="search-btn">
                        <i class="fas fa-magnifying-glass"></i> Find Donors
                    </button>
                </form>
            </div>
        </div>

        <!-- Donors Results -->
        <div class="donors-results-wrapper">
            <div class="results-header">
                <h2><i class="fas fa-users"></i> Available Donors</h2>
                <div id="resultCount" class="result-count"></div>
            </div>
            <div id="donorList" class="donors-grid"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { getMatchingDonors } from "./identify_blood.js";

        document.getElementById("donorForm").addEventListener("submit", async function (e) {
            e.preventDefault();
            const bloodGroup = document.getElementById("bloodGroup").value;
            console.log("Form submitted with blood group:", bloodGroup);

            if (bloodGroup) {
                console.log("Calling getMatchingDonors...");
                const donors = await getMatchingDonors(bloodGroup);
                console.log("Donors returned:", donors);
                displayDonors(donors, bloodGroup);
            } else {
                console.log("No blood group selected");
            }
        });

        // Logout functionality
        document.getElementById("logoutBtn").addEventListener("click", function() {
            localStorage.removeItem('authToken');
            window.location.href = "/";
        });

        function displayDonors(donors, bloodGroup) {
            const donorList = document.getElementById("donorList");
            const resultCount = document.getElementById("resultCount");
            donorList.innerHTML = "";
            resultCount.innerHTML = "";
            
            if (donors.length === 0) {
                donorList.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <h3>No Donors Found</h3>
                        <p>No donors available with blood group <strong>${bloodGroup}</strong></p>
                    </div>
                `;
                return;
            }

            resultCount.innerHTML = `<span class="badge bg-danger">${donors.length} ${donors.length === 1 ? 'Donor' : 'Donors'} Found</span>`;

            donors.forEach((donor, index) => {
                const card = document.createElement("div");
                card.className = "donor-card";
                card.style.animationDelay = `${index * 0.1}s`;
                card.innerHTML = `
                    <div class="card-header">
                        <div class="blood-type-badge">${donor.s_blood_group}</div>
                        <h3 class="donor-name">${donor.s_name}</h3>
                    </div>
                    <div class="card-body">
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-calendar"></i> Age:</span>
                            <span class="info-value">${donor.s_age} years</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-id-card"></i> Student ID:</span>
                            <span class="info-value">${donor.s_id}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-envelope"></i> Email:</span>
                            <span class="info-value email-text">${donor.s_email}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-phone"></i> Phone:</span>
                            <span class="info-value">${donor.s_phone_no}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-book"></i> Department:</span>
                            <span class="info-value">${donor.s_deparment}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-graduation-cap"></i> Year:</span>
                            <span class="info-value">
                                ${donor.s_year === 1 ? 'First Year' : donor.s_year === 2 ? 'Second Year' : donor.s_year === 3 ? 'Third Year' : 'Final Year'}
                            </span>
                        </div>
                    </div>
                    <div class="card-footer">
                        <a href="mailto:${donor.s_email}" class="contact-btn">
                            <i class="fas fa-envelope"></i> Contact Donor
                        </a>
                        <a href="tel:${donor.s_phone_no}" class="contact-btn phone-btn">
                            <i class="fas fa-phone"></i> Call
                        </a>
                    </div>
                `;
                donorList.appendChild(card);
            });
        }
    </script>
</body>
</html>
